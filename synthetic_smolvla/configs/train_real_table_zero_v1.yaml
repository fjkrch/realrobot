training:
  dataset: synthetic_smolvla/datasets/openarm_real_table_zero_v1
  checkpoint_dir: synthetic_smolvla/checkpoints/smolvla_openarm_real_table_zero_v1
  policy: smolvla
  policy_path: lerobot/smolvla_base
  device: cuda
  batch_size: 1
  steps: 20000
  save_freq: 5000
  # Keep chunk_size at the pretrained smolvla_base value. The new dataset has
  # 100-frame episodes, but the pretrained action head expects chunk_size=50.
  chunk_size: 50
  n_action_steps: 10
  run_mode: preflight_only
