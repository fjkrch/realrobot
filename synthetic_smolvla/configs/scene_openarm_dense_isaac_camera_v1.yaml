scene:
  name: openarm_dense_isaac_camera_v1
  sim_only: true
  openarm_setup: bimanual
  active_arm: right
  # Dedicated scene for the corrected dense Isaac-camera dataset. It keeps the
  # proven reachable pocket (base at (0,0,0.40); table+objects at x=0.30,
  # y in [-0.28,-0.08], z~0.55) from scene_openarm_four_objects.yaml, but:
  #   * cubes are 1 inch (0.0254 m) per side, as requested for v1;
  #   * the camera renders a SQUARE RGB frame so the dense exporter can store the
  #     real Isaac camera tensor directly (no aspect distortion) instead of the
  #     deterministic top-down placeholder.
  # The original scene_openarm_four_objects.yaml is left untouched so the old
  # baseline dataset/oracle/RL paths keep working.
  table:
    prim_path: /World/Table
    size_m: [0.40, 0.40, 0.04]
    pose_m: [0.32, -0.16, 0.51]
    color_rgb: [1.0, 1.0, 1.0]
  camera:
    prim_path: /World/Camera
    # Square render so the LeRobot frame is square with no crop/stretch. The
    # eye/target keep the table-facing view that sees the gripper, all four
    # object spawns, contact, and the lifted object.
    resolution: [256, 256]
    eye_m: [0.78, -0.62, 0.86]
    target_m: [0.30, -0.16, 0.545]
    focal_length_mm: 24.0
  workspace_bounds_m:
    x: [0.24, 0.36]
    y: [-0.30, -0.04]
    z: [0.54, 0.56]

robot:
  base_pose_m: [0.0, 0.0, 0.40]
  reset_pose_deg:
    right:
      joint_1: 0.0
      joint_2: 20.0
      joint_3: 0.0
      joint_4: 55.0
      joint_5: 0.0
      joint_6: 15.0
      joint_7: 0.0
      gripper: -65.0
    left:
      joint_1: 0.0
      joint_2: -20.0
      joint_3: 0.0
      joint_4: 55.0
      joint_5: 0.0
      joint_6: -15.0
      joint_7: 0.0
      gripper: -65.0

objects:
  - name: orange_ball
    instruction: pick up the orange ball
    shape: sphere
    color_rgb: [1.0, 0.45, 0.02]
    radius_m: 0.020
    spawn_pose_m: [0.30, -0.26, 0.55]
  - name: red_cube
    instruction: pick up the red cube
    shape: cube
    color_rgb: [0.9, 0.03, 0.03]
    size_m: [0.0254, 0.0254, 0.0254]
    spawn_pose_m: [0.30, -0.20, 0.55]
  - name: green_cube
    instruction: pick up the green cube
    shape: cube
    color_rgb: [0.05, 0.70, 0.12]
    size_m: [0.0254, 0.0254, 0.0254]
    spawn_pose_m: [0.30, -0.14, 0.55]
  - name: blue_cube
    instruction: pick up the blue cube
    shape: cube
    color_rgb: [0.04, 0.20, 0.95]
    size_m: [0.0254, 0.0254, 0.0254]
    spawn_pose_m: [0.30, -0.08, 0.55]
