scene:
  name: openarm_real_table_zero_left_centered_v1
  sim_only: true
  openarm_setup: bimanual
  active_arm: left
  # Single-LEFT-arm collection scene for the clean-1000 recollection.
  # The left arm sits on the +y side (right arm zero-pose TCP is at y=-0.25, so by
  # symmetry the left arm rest TCP is ~+0.25). A single arm cannot reach the whole
  # y=[-0.24,+0.24] object row, so the whole row is rigidly shifted +0.16 m toward
  # the left arm (order + identities preserved: orange, red, green, blue) and the
  # camera is re-aimed to keep the row centered. This is an authorized re-center,
  # NOT a lane swap. Feasibility of clean left-arm lifts for ALL four is validated
  # by a smoke run before any full collection.
  #
  # Real-setup update (user, 2026-06-19): the table is a box ~73 cm tall and ~20 cm
  # from the robot. Encoded as: table top z=0.73 m; objects at x=0.58 so the
  # robot-to-object gap = object_x - base_x = 0.58 - 0.38 = 0.20 m.
  allow_out_of_contract_reset_pose: true
  layout_info_cm:
    table_height: 73.0
    table_edge_width: 150.0
    robot_plus_table_height: 125.0
    robot_base_width: 43.0
    table_to_robot_gap: 20.0
    total_horizontal_space: 223.0
    fallback_root_offset_reason: "USD root calibrated for reachable sim-only tabletop training"
    left_center_shift_y_m: 0.16
  table:
    prim_path: /World/Table
    size_m: [1.50, 1.50, 0.04]
    pose_m: [1.265, 0.0, 0.71]
    # Cardboard brown to match the real Dell box surface (darker/saturated so it
    # reads as cardboard under the bright scene light, not washed-out cream).
    color_rgb: [0.58, 0.42, 0.25]
  appearance:
    lighting:
      # Lowered from the default 3000 so the cardboard box reads as its diffuse
      # color instead of being overexposed to white.
      intensity: 1100.0
      color: [0.85, 0.82, 0.75]
    floor:
      enabled: true
      size_m: [5.0, 4.0, 0.02]
      pose_m: [1.35, 0.0, -0.008]
      color_rgb: [0.50, 0.50, 0.49]
      roughness: 0.98
      speckles:
        count: 88
        margin_m: 0.18
        min_size_m: 0.030
        max_size_m: 0.100
        thickness_m: 0.004
        z_offset_m: 0.008
        region_m:
          x: [-0.30, 0.56]
          y: [-1.10, 1.10]
        color_rgb_min: [0.34, 0.34, 0.33]
        color_rgb_max: [0.70, 0.70, 0.68]
    table_rim:
      enabled: true
      sides: [front, left, right]
      thickness_m: 0.035
      height_m: 0.04
      # Darker cardboard brown for the box front/side edges (box face in shadow).
      color_rgb: [0.34, 0.26, 0.17]
      roughness: 0.85
    wall:
      enabled: true
      size_m: [0.04, 4.0, 1.75]
      pose_m: [2.42, 0.0, 0.875]
      color_rgb: [0.82, 0.82, 0.78]
      roughness: 0.90
    baseboard:
      enabled: true
      size_m: [0.055, 4.0, 0.10]
      pose_m: [2.385, 0.0, 0.055]
      color_rgb: [0.055, 0.052, 0.050]
      roughness: 0.82
  camera:
    prim_path: /World/RobotViewCamera
    resolution: [256, 256]
    eye_m: [0.46, 0.16, 1.06]
    target_m: [0.66, 0.16, 0.725]
    focal_length_mm: 12.0
  workspace_bounds_m:
    x: [0.50, 2.02]
    y: [-0.75, 0.75]
    z: [0.72, 0.79]

robot:
  base_pose_m: [0.38, 0.0, 0.60]
  reset_pose_deg:
    right:
      joint_1: 0.0
      joint_2: 0.0
      joint_3: 0.0
      joint_4: 0.0
      joint_5: 0.0
      joint_6: 0.0
      joint_7: 0.0
      gripper: 0.0
    left:
      joint_1: 0.0
      joint_2: 0.0
      joint_3: 0.0
      joint_4: 0.0
      joint_5: 0.0
      joint_6: 0.0
      joint_7: 0.0
      gripper: 0.0

objects:
  - name: orange_ball
    instruction: pick up the orange ball
    shape: sphere
    color_rgb: [1.0, 0.45, 0.02]
    radius_m: 0.020
    spawn_pose_m: [0.58, -0.08, 0.75]
  - name: red_cube
    instruction: pick up the red cube
    shape: cube
    color_rgb: [0.9, 0.03, 0.03]
    size_m: [0.0254, 0.0254, 0.0254]
    spawn_pose_m: [0.58, 0.08, 0.745]
  - name: green_cube
    instruction: pick up the green cube
    shape: cube
    color_rgb: [0.05, 0.70, 0.12]
    size_m: [0.0254, 0.0254, 0.0254]
    spawn_pose_m: [0.58, 0.24, 0.745]
  - name: blue_cube
    instruction: pick up the blue cube
    shape: cube
    color_rgb: [0.04, 0.20, 0.95]
    size_m: [0.0254, 0.0254, 0.0254]
    spawn_pose_m: [0.58, 0.40, 0.745]
