# Dataset spec for retraining SmolVLA on the measured table layout with an
# approximate robot-view camera and all-zero reset pose.
dataset:
  name: openarm_real_table_zero_v1
  output_dir: synthetic_smolvla/datasets/openarm_real_table_zero_v1
  repo_id: local/openarm_real_table_zero_v1
  manifest: synthetic_smolvla/reports/openarm_real_table_zero_v1_manifest.jsonl
  report: synthetic_smolvla/reports/openarm_real_table_zero_v1_dataset.md
  scene_config: synthetic_smolvla/configs/scene_openarm_real_table_zero_train_v1.yaml
  image_size: 256
  fps: 10

collection:
  # Keep the first full run conservative. Run a smoke collection first, inspect
  # sample frames and success rate, then increase rounds if the IK can lift.
  num_envs: 16
  rounds: 130
  seed: 23000
  randomize: true
  target_weights: "1.6,1,1,1"
  grasp_close_deg: -3.0
  drop_limit_exceeded: false
  device: cuda:0

control_schedule:
  # 100 recorded frames per episode. This doubles the previous 50-frame dense
  # recipe while keeping the same phase proportions.
  approach_steps: 28
  descend_steps: 24
  close_steps: 16
  lift_steps: 24
  hold_steps: 8
  # Movement sampling: 10 physics steps are simulated for every recorded
  # action/state/camera frame.
  substeps: 10
  settle_steps: 40
  above_offset_m: 0.12
  lift_offset_m: 0.05
  lift_threshold_m: 0.04
  grasp_close_deg: 0.0

features:
  observation.images.camera1: { dtype: image, shape: [256, 256, 3] }
  observation.state: { dtype: float32, shape: [8] }
  action: { dtype: float32, shape: [8] }

notes:
  - "Use synthetic_smolvla/scripts/collect_dense_isaac_dataset.py with this scene config."
  - "Episode length is 100 recorded frames: 28 approach, 24 descend, 16 close, 24 lift, 8 hold."
  - "Movement sampling uses 10 physics substeps per recorded frame."
  - "Lift waypoint is 5 cm above the grasp waypoint per latest user constraint."
  - "observation.state is measured 7 arm joints + gripper, degrees."
  - "action is commanded clamped IK target, degrees."
  - "Frames are the Isaac scene camera tensor from the robot-view camera."
  - "Real robot motion is not part of this dataset/training run."
  - "Reject object-object collisions and gripper/table collisions before saving episodes."
  - "Gripper close commands are capped at -3 deg for this training run."
